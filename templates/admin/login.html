<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Keerthivasan Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}" />
</head>
<body>
<div class="login-page">
  <div class="login-orb login-orb-1"></div>
  <div class="login-orb login-orb-2"></div>

  <div class="login-card">
    <div class="login-logo">
      <span class="login-logo-text">&lt;K/&gt;</span>
      <p>Portfolio Admin Panel</p>
    </div>

    {% if error %}
    <div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>
    {% endif %}

    <form method="POST" class="login-form">
      <div class="form-group">
        <label>Username</label>
        <div class="login-input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" name="username" placeholder="admin" required autocomplete="username" />
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="login-input-wrap" style="position:relative;">
          <i class="fas fa-lock"></i>
          <input type="password" id="pw" name="password" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" onclick="togglePw()" style="position:absolute;right:0.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#8892a4;cursor:pointer;font-size:0.85rem;">
            <i class="fas fa-eye" id="pw-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> Login to Admin</button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:0.8rem;color:#4a5568;">
      Default: <code>admin</code> / <code>admin@123</code> — change in app.py
    </p>
    <div style="text-align:center;margin-top:1rem;">
      <a href="/" style="color:#8892a4;font-size:0.82rem;text-decoration:none;">
        <i class="fas fa-arrow-left"></i> Back to Portfolio
      </a>
    </div>
  </div>
</div>
<script>
function togglePw() {
  const pw = document.getElementById('pw');
  const eye = document.getElementById('pw-eye');
  if (pw.type === 'password') { pw.type = 'text'; eye.className = 'fas fa-eye-slash'; }
  else { pw.type = 'password'; eye.className = 'fas fa-eye'; }
}
</script>
</body>
</html>
